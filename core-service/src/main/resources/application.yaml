server:
  port: 8081

spring:
  application:
    name: core-service

  datasource:
    url: jdbc:postgresql://ep-dry-silence-aoa09kmu.c-2.ap-southeast-1.aws.neon.tech:5432/neondb?sslmode=require
    username: neondb_owner
    password: ${NEON_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 900000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  auth:
    jwt:
      issuer: tenantcore-core-service
      secret: ${APP_JWT_SECRET:tenantcore-dev-secret-change-me-tenantcore-dev-secret}
      access-token-expiration-seconds: 3600
      refresh-token-expiration-seconds: 604800
