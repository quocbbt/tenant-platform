server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: core-service
          uri: ${CORE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/core/**,/api/auth/**,/api/users/**,/api/roles/**,/api/permissions/**,/api/files/**,/api/audit/**,/api/notifications/**

        - id: logiflow-service
          uri: ${LOGIFLOW_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/logiflow/**
